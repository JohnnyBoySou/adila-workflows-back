# Força o nixpacks a usar o provider Bun.
#
# Sem isso, ele detecta `package.json` primeiro e cai no provider Node,
# que ainda referencia Node.js 18 (EOL, removido do nixpkgs) e quebra o build.
#
# `startCommand` fica em railway.toml / railway.worker.toml pra cada serviço
# escolher entre `bun run start` (API) ou `bun run start:worker` (worker).
providers = ["bun"]

[phases.setup]
nixPkgs = ["bun"]

[phases.install]
cmds = ["bun install --frozen-lockfile"]
